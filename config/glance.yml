server:
  assets-path: /app/assets

theme:
  # Note: assets are cached by the browser, changes to the CSS file
  # will not be reflected until the browser cache is cleared (Ctrl+F5)
  custom-css-file: /assets/user.css
  disable-picker: true

document:
  head: |
    <script>
    setInterval(() => {
      // 1. Process custom header links
      const header = document.querySelector(".header");
      if (header && !document.getElementById("custom-header-links")) {
        const linksContainer = document.createElement("div");
        linksContainer.id = "custom-header-links";
        linksContainer.className = "flex items-center gap-15 self-center";
        linksContainer.style.cssText = "display: flex; align-items: center; gap: 1.5rem; margin-left: auto; font-size: 0.9rem;";
        
        linksContainer.innerHTML = `
          <a href="https://github.com/tdelamater1" target="_blank" rel="noreferrer" class="nav-item flex items-center gap-5" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--color-text-base-muted);">
            <img src="https://cdn.jsdelivr.net/npm/simple-icons@latest/icons/github.svg" style="width: 1rem; height: 1rem; filter: invert(0.65);" alt="">
            GitHub
          </a>
          <a href="https://mistythicket.xyz" target="_blank" rel="noreferrer" class="nav-item flex items-center gap-5" style="display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--color-text-base-muted);">
            <img src="https://cdn.jsdelivr.net/npm/@mdi/svg@latest/svg/web.svg" style="width: 1rem; height: 1rem; filter: invert(0.65);" alt="">
            Website
          </a>
        `;
        header.appendChild(linksContainer);
      }

      // 2. Shuffle YouTube Shorts and select 12 random ones
      const shortsWidget = document.querySelector(".yt-shorts-widget");
      if (shortsWidget) {
        const list = shortsWidget.querySelector("ul.list");
        if (list && !list.hasAttribute("data-shuffled")) {
          list.setAttribute("data-shuffled", "true");
          const items = Array.from(list.querySelectorAll("li.thumbnail-parent"));
          if (items.length > 0) {
            // Fisher-Yates shuffle
            for (let i = items.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              const temp = items[i];
              items[i] = items[j];
              items[j] = temp;
            }
            
            // Keep at most 12 items
            const keepItems = items.slice(0, 12);
            list.innerHTML = "";
            
            keepItems.forEach((item, idx) => {
              if (idx < 6) {
                item.classList.remove("collapsible-item");
              } else {
                item.classList.add("collapsible-item");
                item.style.animationDelay = ((idx - 6) * 20).toString() + "ms";
              }
              list.appendChild(item);
            });
          }
        }
      }

      // 3. Copy YouTube Shorts titles/descriptions to thumbnails for tooltips
      if (shortsWidget) {
        const items = shortsWidget.querySelectorAll("li.thumbnail-parent");
        items.forEach(item => {
          const thumbnailContainer = item.querySelector(".rss-detailed-thumbnail");
          if (thumbnailContainer && !thumbnailContainer.hasAttribute("data-tooltip")) {
            const descEl = item.querySelector(".rss-detailed-description");
            const titleEl = item.querySelector("a.size-h3");
            const tooltipText = descEl ? descEl.textContent.trim() : (titleEl ? titleEl.textContent.trim() : "");
            if (tooltipText) {
              thumbnailContainer.setAttribute("data-tooltip", tooltipText);
            }
          }
        });
      }
    }, 200);

    // YouTube playable inline lightbox modal
    const initYtLightbox = () => {
      if (document.getElementById("yt-modal")) return;

      let activeLink = null;
      let playlistLinks = [];
      let currentIndex = -1;

      const modal = document.createElement("div");
      modal.id = "yt-modal";
      modal.style.cssText = `
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: rgba(10, 10, 12, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 999999;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      `;

      const container = document.createElement("div");
      container.id = "yt-modal-container";
      container.style.cssText = `
        position: relative;
        background: #000;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transform: scale(0.9);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        width: 90%;
      `;

      const closeBtn = document.createElement("button");
      closeBtn.innerHTML = `
        <svg style="width: 1.25rem; height: 1.25rem;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      `;
      closeBtn.style.cssText = `
        position: absolute;
        top: 16px; right: 16px;
        width: 38px; height: 38px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000000;
        transition: background 0.2s, transform 0.2s;
      `;
      closeBtn.onmouseenter = () => {
        closeBtn.style.background = 'rgba(255, 255, 255, 0.25)';
        closeBtn.style.transform = 'scale(1.05)';
      };
      closeBtn.onmouseleave = () => {
        closeBtn.style.background = 'rgba(255, 255, 255, 0.15)';
        closeBtn.style.transform = 'scale(1)';
      };

      const iframe = document.createElement("iframe");
      iframe.id = "yt-modal-iframe";
      iframe.style.cssText = `
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      `;
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;

      container.appendChild(closeBtn);
      container.appendChild(iframe);
      modal.appendChild(container);
      document.body.appendChild(modal);

      const closeModal = () => {
        modal.style.opacity = "0";
        container.style.transform = "scale(0.9)";
        setTimeout(() => {
          modal.style.display = "none";
          iframe.src = "";
        }, 300);
      };

      const openVideo = (link) => {
        if (!link) return;
        const href = link.href;
        const isShort = href.includes("/shorts/");
        const isWatch = href.includes("/watch?v=") || href.includes("youtu.be/") || href.includes("/v/");
        
        let videoId = "";
        if (isShort) {
          const match = href.match(/\/shorts\/([a-zA-Z0-9_-]+)/);
          if (match) videoId = match[1];
        } else {
          const match = href.match(/(?:v=|\/)([a-zA-Z0-9_-]{11})/);
          if (match) videoId = match[1];
        }

        if (videoId) {
          activeLink = link;
          const widget = link.closest(".widget") || document;
          playlistLinks = Array.from(widget.querySelectorAll("a.color-primary-if-not-visited")).filter(el => {
            const h = el.href || "";
            return h.includes("/shorts/") || h.includes("/watch?v=") || h.includes("youtu.be/") || h.includes("/v/");
          });
          currentIndex = playlistLinks.indexOf(link);

          if (isShort) {
            container.style.aspectRatio = "9/16";
            container.style.maxWidth = "420px";
            container.style.maxHeight = "85vh";
          } else {
            container.style.aspectRatio = "16/9";
            container.style.maxWidth = "880px";
            container.style.maxHeight = "unset";
          }
          iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;

          modal.style.display = "flex";
          modal.offsetHeight;
          modal.style.opacity = "1";
          container.style.transform = "scale(1)";
        }
      };

      closeBtn.addEventListener("click", closeModal);
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal();
      });

      document.addEventListener("keydown", (e) => {
        if (modal.style.display === "flex") {
          if (e.key === "Escape") {
            closeModal();
          } else if (e.key === "ArrowRight" || e.key === "ArrowDown") {
            e.preventDefault();
            if (playlistLinks.length > 0 && currentIndex !== -1) {
              const nextIndex = (currentIndex + 1) % playlistLinks.length;
              openVideo(playlistLinks[nextIndex]);
            }
          } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
            e.preventDefault();
            if (playlistLinks.length > 0 && currentIndex !== -1) {
              const prevIndex = (currentIndex - 1 + playlistLinks.length) % playlistLinks.length;
              openVideo(playlistLinks[prevIndex]);
            }
          }
        }
      });

      document.addEventListener("click", (event) => {
        const link = event.target.closest("a");
        if (!link) return;
        const href = link.href;
        if (!href) return;

        const isShort = href.includes("/shorts/");
        const isWatch = href.includes("/watch?v=") || href.includes("youtu.be/") || href.includes("/v/");
        
        if (isShort || isWatch) {
          event.preventDefault();
          openVideo(link);
        }
      }, true);

      // Thumbnail click delegation to open standard link in lightbox
      document.addEventListener("click", (event) => {
        const thumbnail = event.target.closest(".rss-detailed-thumbnail");
        if (thumbnail && thumbnail.closest(".yt-shorts-widget")) {
          const parentLi = thumbnail.closest("li");
          const link = parentLi.querySelector("a.size-h3");
          if (link) {
            event.preventDefault();
            event.stopPropagation();
            link.click();
          }
        }
      }, true);
    };

    if (document.body) {
      initYtLightbox();
    } else {
      window.addEventListener("DOMContentLoaded", initYtLightbox);
    }
    </script>

pages:
  # It's not necessary to create a new file for each page and include it, you can simply
  # put its contents here, though multiple pages are easier to manage when separated
  - $include: home.yml
